<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; }
body { margin: 0; background: #ffffff; display: flex; justify-content: center; padding: 30px 34px; }
.stage { width: 760px; max-width: 100%; }
.sim-components {
  --sc-paper: #faf9f5; --sc-card-bd: #e7e3d8; --sc-ink: #1a1a19; --sc-muted: #84827f;
  --sc-sans: 'Inter', system-ui, -apple-system, sans-serif;
  --sc-mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
  margin: 0; padding: clamp(16px, 3vw, 24px); background: var(--sc-paper);
  border: 1px solid var(--sc-card-bd); border-radius: 14px;
  box-shadow: 0 1px 3px rgba(22, 20, 15, 0.05); font-family: var(--sc-sans); color: var(--sc-ink);
}
.sim-components .hw   { --bd: #e09a52; --ink: #c25a25; --bg: #fdf3e6; }
.sim-components .sw   { --bd: #8b82e0; --ink: #5a4fcb; --bg: #f1eff9; }
.sim-components .data { --bd: #41a07f; --ink: #0e6b52; --bg: #eaf7f1; }
.sim-components .obs  { --bd: #6aa5d9; --ink: #1d558e; --bg: #e8f1fa; }
.sim-components .sc-title { font-size: 12.5px; font-weight: 400; color: var(--sc-muted); letter-spacing: 0.01em; margin-bottom: 14px; }
.sim-components .sc-chips { display: flex; flex-wrap: wrap; gap: 8px; }
.sim-components .sc-chip { display: inline-flex; align-items: center; gap: 8px; min-height: 34px; padding: 5px 15px; border-radius: 7px; border: 1.3px solid var(--bd); background: var(--bg); }
.sim-components .sc-nm { font-family: var(--sc-mono); font-size: 11.5px; font-weight: 500; color: var(--ink); }
.sim-components .sc-ro { font-size: 10.5px; color: var(--sc-muted); }
.sim-components .sc-legend { display: flex; flex-wrap: wrap; gap: 10px 18px; margin-top: 22px; }
.sim-components .sc-lg { display: inline-flex; align-items: center; gap: 7px; font-size: 11px; color: var(--sc-muted); }
.sim-components .sc-dot { width: 8px; height: 8px; border-radius: 2.5px; background: var(--bd); }
</style></head>
<body>
<div class="stage">
  <div class="sim-components">
    <div class="sc-title">Simulated components</div>
    <div class="sc-chips">
      <span class="sc-chip hw"><span class="sc-nm">Open5GS</span><span class="sc-ro">5G core · CPU-capped AMF</span></span>
      <span class="sc-chip hw"><span class="sc-nm">PacketRusher</span><span class="sc-ro">gNB + UE storm injector</span></span>
      <span class="sc-chip sw"><span class="sc-nm">NGAP / NAS</span><span class="sc-ro">registration signalling</span></span>
      <span class="sc-chip data"><span class="sc-nm">storm record</span><span class="sc-ro">seeded rate · UEs · duration</span></span>
      <span class="sc-chip obs"><span class="sc-nm">Prometheus</span><span class="sc-ro">AMF metric scrape</span></span>
    </div>
    <div class="sc-legend">
      <span class="sc-lg"><span class="sc-dot hw"></span>HW sim</span>
      <span class="sc-lg"><span class="sc-dot sw"></span>Software</span>
      <span class="sc-lg"><span class="sc-dot data"></span>Data</span>
      <span class="sc-lg"><span class="sc-dot obs"></span>Observability</span>
    </div>
  </div>
</div>
</body></html>
