
logger:
  file: /open5gs/install/var/log/open5gs/amf.log

# P5 ADAPTATION (sustained-overload tuning): raise the gNB-UE context pool above
# the upstream 1024. At the default the pool fills in seconds and the gNB stalls on
# SCTP backpressure, so reginitreq tracks (not exceeds) the AMF's completion rate
# and the live_peak_rate vs capacity_rate ordering is unstable run-to-run. A larger
# pool lets reginitreq climb at the true offered rate, decoupled from the capped
# AMF's throughput, giving a reproducible sustained deficit. See
# docs/topology-notes.md "Sustained-overload tuning".
global:
  max:
    ue: 16384

amf:
  sbi:
    server:
      - address: 127.0.0.5
        port: 80
    client:
      scp:
        - uri: http://127.0.1.10:80
  ngap:
    server:
      - address: 10.10.2.2
  metrics:
    server:
      # P2 ADAPTATION (only change from upstream amf.yaml): bind 0.0.0.0 instead of
      # 127.0.0.5 so the separate prometheus container can scrape 9090 over the bridge.
      - address: 0.0.0.0
        port: 9090
  guami:
    - plmn_id:
        mcc: 001
        mnc: 01
      amf_id:
        region: 2
        set: 1
  tai:
    - plmn_id:
        mcc: 001
        mnc: 01
      tac: 1
  plmn_support:
    - plmn_id:
        mcc: 001
        mnc: 01
      s_nssai:
        - sst: 1
          sd: 000001
        - sst: 2
          sd: 000002
  security:
      integrity_order : [ NIA2, NIA1, NIA0 ]
      ciphering_order : [ NEA0, NEA1, NEA2 ]
  network_name:
      full: Open5GS
  amf_name: open5gs-amf0

  time:
    t3512:
      value: 540
